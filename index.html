<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>新笔记-重建</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">

    <script>
        const savedTheme = localStorage.getItem('geek_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>

    <!-- 1. 引入 Material Symbols 图标库 (图标必需) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <!-- 2. 引入 Milkdown Crepe 核心排版样式 (注意路径中的 /lib/) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@milkdown/crepe@7/lib/theme/common/style.css" />
    <!-- 3. 引入 Milkdown Crepe 官方 Frame 皮肤主题 (注意路径中的 /lib/) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@milkdown/crepe@7/lib/theme/frame.css" />
    
    <link rel="stylesheet" href="./style.css">

    <script type="module" src="./src/main.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/default.css">
    <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/index.min.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            MobileDragDrop.polyfill({ holdToDrag: 300 }); 
        });
    </script>

    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WebNote">
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-content">
            <div style="display: flex; justify-content: flex-start; align-items: center; gap: 12px; margin-bottom: 5px;">
                <div class="hamburger-pin" id="pinBtn" title="驻留/取消驻留">☰</div>
                <div class="theme-toggle-btn" title="切换亮/暗模式">🌓</div>
                <div onclick="window.location.href='https://lt.838808.xyz/api/logout'" title="退出系统" style="cursor: pointer; font-size: 16px; transition: opacity 0.2s;" onmouseover="this.style.opacity=0.7" onmouseout="this.style.opacity=1">🚪</div>
                <div id="btn-file-hall" title="文件大厅" style="cursor: pointer; font-size: 16px;">📁</div>
                <div id="btn-file-encrypt" title="文件加密" style="cursor: pointer; font-size: 16px;">🔐</div>
            </div>
            
            <div class="sidebar-title" style="margin-top: 0;"><span>最近使用</span></div>
            <div class="file-list" id="cloud-file-list">
                <div style="color: #c0c4cc; font-size: 12px; text-align: center; margin-top: 20px;">等待唤醒...</div>
            </div>
        </div>
    </div>

    <div id="main-canvas">
        <div class="top-action-bar">
            <div class="action-left">
                <div class="mobile-menu-btn action-icon" title="菜单">☰</div>
                <div class="new-note-btn action-icon" title="新建画布">➕</div>
                <button id="btn-sync" class="action-icon" title="保存推流">💾</button>
            </div>
        
            <div class="action-right">
                <div id="status-bar" class="status-bar-text">✅ 系统就绪</div>
            </div>
        </div>

        <div class="editor-width-limiter">
            <input type="text" id="note-title" placeholder="无标题">
            
            <details class="meta-details">
                <summary>属性与元数据</summary>
                <div class="meta-panel">
                    <div class="meta-label">创建时间</div><div id="meta-created">（未保存）</div>
                    <div class="meta-label">最后修改</div><div id="meta-updated">（未保存）</div>
                    <div class="meta-label">极客标签</div>
                    <div id="meta-tags-container" style="min-height: 24px; padding-top: 2px;"></div>
                </div>
            </details>
            <div class="divider"></div>
            
            <div id="milkdown-editor"></div>
        </div>
    </div>

    <div class="modal-overlay" id="fileBrowserModal">
        <div class="modal-content" id="modal-content-area">
            <div class="modal-header">
                <div class="modal-title">文件大厅</div>
                <div class="btn-close" id="btn-close-modal" title="关闭">&times;</div>
            </div>
            <div class="modal-body">
                <div class="modal-sidebar" style="display: flex; flex-direction: column; padding: 0;">
                    <div style="padding: 16px 12px 8px 12px;">
                        <div class="tag-item active" id="view-all-files">📁 所有文件</div>
                    </div>
                    <div style="height: 1px; background: var(--border-light); margin: 4px 12px;"></div>
                    <div style="padding: 8px 16px; display: flex; align-items: center; justify-content: space-between;">
                        <span style="font-size: 13px; font-weight: bold; color: var(--text-muted);">自定义标签</span>
                        <button id="btn-add-tag" title="新建标签" style="background: transparent; border: none; font-size: 18px; cursor: pointer; color: var(--text-muted); padding: 0 4px; line-height: 1; transition: color 0.2s;">+</button>
                    </div>
                    <div id="tag-sidebar-list" style="flex: 1; overflow-y: auto; padding: 4px 12px;"></div>
                </div>
                <div class="modal-main">
                    <div class="file-grid" id="file-grid-container"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="tagModal" style="z-index: 4001;">
        <div class="modal-content" style="width: 340px; height: max-content; padding: 20px 24px; display: block; overflow: visible; background: var(--bg-body);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <div id="tag-cancel" style="color: var(--color-accent); font-size: 15px; cursor: pointer;">取消</div>
                <div style="font-size: 16px; font-weight: 600; color: var(--text-main);" id="tag-modal-title">新建标签</div>
                <div id="tag-confirm" style="color: var(--color-accent); font-size: 15px; font-weight: 600; cursor: pointer;">完成</div>
            </div>
            <input type="text" id="tag-name-input" placeholder="输入标签名称..." style="width: 100%; box-sizing: border-box; padding: 12px; border: none; border-radius: 8px; margin-bottom: 20px; outline: none; font-size: 15px; background: var(--bg-panel); color: var(--text-main);">
            <div style="margin-bottom: 24px;">
                <div style="font-size: 14px; color: var(--text-main); margin-bottom: 12px; font-weight: 500;">选择颜色</div>
                <div id="tag-color-picker" style="display: flex; gap: 12px; flex-wrap: wrap;"></div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid var(--border-light);">
                <div style="font-size: 15px; color: var(--text-main); font-weight: 500;">父级标签</div>
                <select id="tag-parent-select" style="font-size: 15px; border: none; outline: none; color: var(--text-muted); background: transparent; cursor: pointer; text-align: right; direction: rtl;"></select>
            </div>
            <div id="tag-edit-actions" style="display: none; margin-top: 16px; border-top: 1px solid var(--border-light); padding-top: 8px;">
                <div id="btn-delete-tag" style="padding: 12px 0; color: #f85149; font-size: 15px; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                    <span>🗑️</span> 删除此标签
                </div>
            </div>
        </div>
    </div>
</body>
</html>
